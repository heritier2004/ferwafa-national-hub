<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FERWAFA Intelligence</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a3a18 0%, var(--bg-dark) 100%);
        }
        .login-box {
            width: 400px;
            padding: 2.5rem;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        .login-error {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box glass">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Access <span>System</span></h2>
            <p style="text-align: center; color: var(--text-dim); margin-bottom: 2rem;">Authorized Personnel Only</p>
            
            <div id="error-message" class="login-error">Invalid email or password.</div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@ferwafa.rw" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: -0.5rem;">
                    <input type="checkbox" id="remember-me" style="width: auto; cursor: pointer;">
                    <label for="remember-me" style="margin-bottom: 0; cursor: pointer;">Remember Me</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Authenticate</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim);">
                Forgotten password? Contact FERWAFA IT Support.
            </p>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); text-align: center;">
                <p style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">Testing Quick Access</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.6rem; border-color: var(--role-admin);" onclick="quickLogin('admin@ferwafa.rw', 'admin123')">Technical Lead</button>
                    <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.6rem; border-color: var(--role-ferwafa);" onclick="quickLogin('hq@ferwafa.rw', 'ferwafa123')">National Hub</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('saved_email');
            const savedPassword = localStorage.getItem('saved_password');
            if (savedEmail && savedPassword) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('password').value = savedPassword;
                document.getElementById('remember-me').checked = true;
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('remember-me').checked;
            const errorMsg = document.getElementById('error-message');
            errorMsg.style.display = 'none';

            try {
                // Using URLSearchParams forces 'application/x-www-form-urlencoded'
                // This is the standard format expected by FastAPI's OAuth2PasswordRequestForm
                const params = new URLSearchParams();
                params.append('username', email);
                params.append('password', password);

                const response = await fetch(`${window.location.origin}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('full_name', data.full_name);
                    localStorage.setItem('logo_url', data.logo_url || '');
                    localStorage.setItem('stadium_name', data.stadium_name || '');
                    
                    if (rememberMe) {
                        localStorage.setItem('saved_email', email);
                        localStorage.setItem('saved_password', password);
                    } else {
                        localStorage.removeItem('saved_email');
                        localStorage.removeItem('saved_password');
                    }
                    
                    // Direct Role-Based Jumps
                    const REDIRECT_MAP = {
                        'SUPER_ADMIN': 'pages/admin.html',
                        'FERWAFA': 'pages/ferwafa_dashboard.html',
                        'CLUB': 'pages/club_dashboard.html',
                        'SCHOOL': 'pages/school_dashboard.html',
                        'ACADEMY': 'pages/academy_dashboard.html',
                        'SCOUT': 'pages/scout_dashboard.html'
                    };
                    
                    window.location.href = REDIRECT_MAP[data.role] || 'pages/dashboard.html';
                } else {
                    const errorDetail = await response.json();
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = "Error: " + (errorDetail.detail || "Authentication failed");
                }
            } catch (err) {
                console.error("Login Error:", err);
                errorMsg.style.display = 'block';
                errorMsg.textContent = "CONNECTION ERROR: " + err.message + " | Target: " + window.location.origin + "/api/auth/login";
            }
        });
        function quickLogin(email, pass) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = pass;
            document.getElementById('remember-me').checked = true;
            document.getElementById('login-form').dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
